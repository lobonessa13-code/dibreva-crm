<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIBREVA — Nova Senha</title>
  <link rel="stylesheet" href="css/tokens.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-body);
      background: var(--azul);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 18px, rgba(255,255,255,0.5) 18px, rgba(255,255,255,0.5) 19px),
        repeating-linear-gradient(90deg, transparent, transparent 18px, rgba(255,255,255,0.5) 18px, rgba(255,255,255,0.5) 19px);
    }
    .login-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 400px;
      padding: 48px 40px 40px;
      position: relative;
      z-index: 1;
    }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo svg { width: 200px; height: auto; }
    .login-title {
      font-family: var(--font-heading);
      font-size: 18px;
      font-weight: 700;
      color: var(--azul);
      text-align: center;
      margin-bottom: 8px;
    }
    .login-subtitle {
      font-size: 13px;
      color: var(--cinza);
      text-align: center;
      margin-bottom: 28px;
    }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-family: var(--font-heading);
      font-size: 12px;
      font-weight: 600;
      color: var(--azul);
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }
    .form-control {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--cinza-light);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--azul);
      background: var(--white);
      transition: border-color var(--transition);
      outline: none;
    }
    .form-control:focus { border-color: var(--laranja); }
    .btn-login {
      width: 100%;
      padding: 13px;
      background: var(--laranja);
      color: var(--white);
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-heading);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background var(--transition);
      margin-top: 8px;
    }
    .btn-login:hover { background: var(--laranja-hover); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
    .alert {
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .alert-error { background: var(--danger-bg); color: var(--danger); }
    .alert-success { background: var(--success-bg); color: var(--success); }
    .alert-info { background: var(--info-bg); color: var(--info); display: block; }
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: var(--cinza);
    }
    .login-toggle {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--cinza);
    }
    .login-toggle a {
      color: var(--laranja);
      text-decoration: none;
      font-weight: 600;
      margin-left: 4px;
    }
    @media (max-width: 480px) {
      .login-card { margin: 16px; padding: 32px 24px 28px; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="8" width="28" height="44" rx="2" fill="none" stroke="#D46250" stroke-width="2.5"/>
        <polyline points="12,36 18,28 24,36" fill="none" stroke="#D46250" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="12,30 18,22 24,30" fill="none" stroke="#D46250" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="12,24 18,16 24,24" fill="none" stroke="#D46250" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="42" y="32" font-family="Montserrat, sans-serif" font-weight="800" font-size="20" fill="#1D2A3A" letter-spacing="3">DIBREVA</text>
        <text x="42" y="48" font-family="Calibri, sans-serif" font-size="8" fill="#A6B0B3" letter-spacing="1.5">MANUTENÇÃO &amp; RESTAURAÇÃO PREDIAL</text>
      </svg>
    </div>

    <h1 class="login-title">Nova Senha</h1>
    <p class="login-subtitle">Defina uma nova senha para sua conta</p>

    <div class="alert alert-info" id="alert-loading">Verificando link de recuperação...</div>
    <div class="alert alert-error" id="alert-error"></div>
    <div class="alert alert-success" id="alert-success"></div>

    <form id="reset-form" onsubmit="handleReset(event)" style="display:none;">
      <div class="form-group">
        <label>Nova senha</label>
        <input type="password" class="form-control" id="new-password" required minlength="6" placeholder="Mínimo 6 caracteres">
      </div>
      <div class="form-group">
        <label>Confirmar nova senha</label>
        <input type="password" class="form-control" id="confirm-password" required minlength="6" placeholder="Repita a senha">
      </div>
      <button type="submit" class="btn-login" id="btn-reset">Salvar nova senha</button>
    </form>

    <div class="login-toggle">
      <a href="login.html">Voltar para o login</a>
    </div>

    <div class="login-footer">DIBREVA Mini ERP v1.0</div>
  </div>

  <script src="js/supabase-config.js?v=10"></script>
  <script>
    const alertLoading = document.getElementById('alert-loading');
    const alertError = document.getElementById('alert-error');
    const alertSuccess = document.getElementById('alert-success');
    const form = document.getElementById('reset-form');

    function showError(msg) {
      alertLoading.style.display = 'none';
      alertError.textContent = msg;
      alertError.style.display = 'block';
    }

    // Supabase coloca o token na hash do URL (#access_token=...&type=recovery)
    (async () => {
      try {
        const { data: { session } } = await sb.auth.getSession();
        if (session) {
          alertLoading.style.display = 'none';
          form.style.display = 'block';
          return;
        }
        // Aguarda evento PASSWORD_RECOVERY que vem do link do email
        sb.auth.onAuthStateChange((event, session) => {
          if (event === 'PASSWORD_RECOVERY' || (event === 'SIGNED_IN' && session)) {
            alertLoading.style.display = 'none';
            form.style.display = 'block';
          }
        });
        // Timeout: se em 4s não houver sessão, link inválido/expirado
        setTimeout(async () => {
          const { data: { session: s2 } } = await sb.auth.getSession();
          if (!s2 && form.style.display === 'none') {
            showError('Link inválido ou expirado. Volte para o login e solicite um novo email de reset.');
          }
        }, 4000);
      } catch (err) {
        showError('Erro ao validar link: ' + err.message);
      }
    })();

    async function handleReset(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-reset');
      const newPass = document.getElementById('new-password').value;
      const confirmPass = document.getElementById('confirm-password').value;

      alertError.style.display = 'none';
      alertSuccess.style.display = 'none';

      if (newPass !== confirmPass) {
        showError('As senhas não coincidem.');
        return;
      }
      if (newPass.length < 6) {
        showError('A senha deve ter no mínimo 6 caracteres.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Salvando...';

      const { error } = await sb.auth.updateUser({ password: newPass });

      if (error) {
        showError('Erro ao atualizar senha: ' + error.message);
        btn.disabled = false;
        btn.textContent = 'Salvar nova senha';
        return;
      }

      alertSuccess.textContent = 'Senha atualizada com sucesso! Redirecionando para o CRM...';
      alertSuccess.style.display = 'block';
      setTimeout(() => { window.location.href = 'crm.html'; }, 1500);
    }
  </script>
</body>
</html>
